# =============================================================================
# FlirtCraft Backend - Pre-commit Hooks Configuration
# =============================================================================
# Automated code quality checks that run before each commit
# Ensures consistent code style and catches issues early
# =============================================================================

repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=88]

  # Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black, --line-length=88]

  # Linting
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=88, --extend-ignore=E203,W503]
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear
          - flake8-comprehensions

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-r, ., -f, json, -o, bandit-report.json]
        exclude: ^tests/

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types: [yaml]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.(md|rst)$
      - id: end-of-file-fixer
        exclude: ^.*\.(md|rst)$
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3009, --ignore, DL3015]

  # Environment file validation
  - repo: local
    hooks:
      - id: env-validation
        name: Validate environment files
        entry: python
        language: python
        args: [-c, "
          import os, sys;
          env_files = ['.env.example'];
          for f in env_files:
              if os.path.exists(f):
                  with open(f) as file:
                      lines = file.readlines();
                      for i, line in enumerate(lines, 1):
                          if '=' in line and not line.startswith('#'):
                              key = line.split('=')[0].strip();
                              if not key.isupper() and not key.startswith('#'):
                                  print(f'{f}:{i}: Environment variable {key} should be uppercase');
                                  sys.exit(1);
        "]
        files: ^\.env

  # Requirements file validation
  - repo: local
    hooks:
      - id: requirements-validation
        name: Validate requirements files
        entry: python
        language: python
        args: [-c, "
          import sys, re;
          req_files = ['requirements.txt', 'requirements-dev.txt'];
          for f in req_files:
              try:
                  with open(f) as file:
                      lines = file.readlines();
                      for i, line in enumerate(lines, 1):
                          line = line.strip();
                          if line and not line.startswith('#') and not line.startswith('-r'):
                              if not re.match(r'^[a-zA-Z0-9\-_\[\]]+==\d+\.\d+\.\d+', line):
                                  print(f'{f}:{i}: {line} should have pinned version (package==x.y.z)');
                                  sys.exit(1);
              except FileNotFoundError:
                  continue;
        "]
        files: ^requirements.*\.txt$

# Configuration
default_language_version:
  python: python3.11

exclude: |
  (?x)^(
      alembic/versions/.*|
      \.venv/.*|
      venv/.*|
      \.git/.*|
      __pycache__/.*|
      \.pytest_cache/.*|
      logs/.*|
      uploads/.*
  )$

# Performance optimization
default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

# Fail fast on first error
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: 3.0.0