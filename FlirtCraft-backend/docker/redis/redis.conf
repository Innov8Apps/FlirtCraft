# =============================================================================
# FlirtCraft Redis Configuration - Development Environment
# =============================================================================
# Optimized for local development with reasonable defaults
# =============================================================================

# Network Configuration
bind 0.0.0.0
port 6379
timeout 300

# Security (basic for development)
# requirepass flirtcraft_redis_dev  # Uncomment if you want password protection
protected-mode no

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence Configuration
# AOF (Append Only File) for better data durability in development
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB Configuration (snapshots)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# Logging
loglevel notice
logfile ""

# Performance Tuning for Development
tcp-keepalive 300
tcp-backlog 511

# Pub/Sub Configuration (for real-time features)
client-output-buffer-limit pubsub 32mb 8mb 60

# Development-specific settings
# Enable keyspace notifications for debugging
notify-keyspace-events "KEA"

# Slow log configuration (log queries taking more than 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client configuration
maxclients 10000

# Database configuration
databases 16

# =============================================================================
# Database Usage Plan:
# - DB 0: Main application cache (user sessions, API responses)
# - DB 1: Background job queue (RQ)
# - DB 2: Real-time pub/sub (conversation updates, typing indicators)
# - DB 3-15: Available for feature-specific caching
# =============================================================================