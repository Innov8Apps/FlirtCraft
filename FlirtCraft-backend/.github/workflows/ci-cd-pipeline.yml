# =============================================================================
# FlirtCraft Backend - Comprehensive CI/CD Pipeline
# =============================================================================
# Automated testing, security scanning, and deployment pipeline
# Supports development, staging, and production environments
# =============================================================================

name: FlirtCraft Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.py"
      - "requirements*.txt"
      - "Dockerfile*"
      - "docker-compose*.yml"
      - "alembic/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.py"
      - "requirements*.txt"
      - "Dockerfile*"
      - "docker-compose*.yml"
      - "alembic/**"
      - ".github/workflows/**"

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  REGISTRY: ghcr.io
  IMAGE_NAME: flirtcraft/backend

# =============================================================================
# Security and Compliance Jobs
# =============================================================================
jobs:
  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install --upgrade pip
          pip install safety bandit semgrep

      - name: Check for dependency vulnerabilities
        run: |
          safety check --requirements requirements.txt --json --output safety-report.json || true
          
      - name: Run static security analysis
        run: |
          bandit -r . -f json -o bandit-report.json || true

      - name: Run Semgrep security scan
        run: |
          semgrep --config=auto --json --output=semgrep-report.json . || true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            bandit-report.json
            semgrep-report.json

  # =============================================================================
  # Code Quality and Testing
  # =============================================================================
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pre-commit
          key: ${{ runner.os }}-deps-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run code formatting check
        run: |
          black --check --diff .
          isort --check-only --diff .

      - name: Run linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      - name: Run type checking
        run: |
          mypy . --ignore-missing-imports --install-types --non-interactive

      - name: Run pylint
        run: |
          pylint app/ --exit-zero --output-format=json > pylint-report.json

      - name: Upload code quality reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: code-quality-reports
          path: |
            pylint-report.json

  # =============================================================================
  # Comprehensive Testing Suite
  # =============================================================================
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        test-type: [unit, integration, end-to-end]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Set up test environment
        run: |
          mkdir -p logs
          cp .env.example .env

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: |
          alembic upgrade head

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          TESTING_MODE: true
        run: |
          pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html --junitxml=junit-unit.xml

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          TESTING_MODE: true
        run: |
          pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml --junitxml=junit-integration.xml

      - name: Run end-to-end tests
        if: matrix.test-type == 'end-to-end'
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          TESTING_MODE: true
        run: |
          pytest tests/e2e/ -v --junitxml=junit-e2e.xml

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.test-type }}
          path: |
            junit-*.xml
            coverage.xml
            htmlcov/

      - name: Upload coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # =============================================================================
  # Performance and Load Testing
  # =============================================================================
  performance-test:
    name: Performance & Load Testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Start application
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Run performance tests
        run: |
          locust --host=http://localhost:8000 --users=50 --spawn-rate=10 --run-time=60s --headless --html=performance-report.html

      - name: Upload performance report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-report
          path: performance-report.html

  # =============================================================================
  # Docker Build and Security Scanning
  # =============================================================================
  docker-build:
    name: Build and Scan Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # Deployment to Different Environments
  # =============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Deploy to Railway Staging
        uses: railwayapp/railway-deploy@v1
        with:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
          service: flirtcraft-backend-staging

      - name: Run staging health checks
        run: |
          sleep 30
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1

      - name: Run staging smoke tests
        run: |
          curl -f ${{ secrets.STAGING_URL }}/api/v1/test || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, performance-test]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to Railway Production
        uses: railwayapp/railway-deploy@v1
        with:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
          service: flirtcraft-backend

      - name: Wait for deployment
        run: sleep 60

      - name: Run production health checks
        run: |
          curl -f ${{ secrets.PRODUCTION_URL }}/health || exit 1

      - name: Run production smoke tests
        run: |
          curl -f ${{ secrets.PRODUCTION_URL }}/api/v1/status || exit 1

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: 'FlirtCraft Backend successfully deployed to production! 🚀'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          text: 'FlirtCraft Backend deployment to production failed! 🚨'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================================================
  # Database Migration Jobs
  # =============================================================================
  migrate-staging:
    name: Run Staging Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          alembic upgrade head

  migrate-production:
    name: Run Production Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          alembic upgrade head

  # =============================================================================
  # Cleanup and Reporting
  # =============================================================================
  cleanup:
    name: Cleanup and Generate Reports
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality, test, docker-build]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate comprehensive report
        run: |
          echo "# FlirtCraft Backend CI/CD Report" > ci-report.md
          echo "## Build Status: ${{ job.status }}" >> ci-report.md
          echo "## Commit: ${{ github.sha }}" >> ci-report.md
          echo "## Branch: ${{ github.ref_name }}" >> ci-report.md
          echo "## Timestamp: $(date)" >> ci-report.md
          
          if [ -d "security-reports" ]; then
            echo "## Security Scan Results" >> ci-report.md
            echo "- Safety scan completed" >> ci-report.md
            echo "- Bandit scan completed" >> ci-report.md
            echo "- Semgrep scan completed" >> ci-report.md
          fi
          
          if [ -d "test-results-unit" ]; then
            echo "## Test Results" >> ci-report.md
            echo "- Unit tests completed" >> ci-report.md
          fi

      - name: Upload final report
        uses: actions/upload-artifact@v3
        with:
          name: ci-cd-report
          path: ci-report.md

# =============================================================================
# Required Secrets for this Pipeline:
# =============================================================================
# Repository Secrets:
# - RAILWAY_STAGING_TOKEN: Railway staging environment token
# - RAILWAY_PRODUCTION_TOKEN: Railway production environment token
# - STAGING_URL: Staging application URL
# - PRODUCTION_URL: Production application URL
# - STAGING_DATABASE_URL: Staging database connection string
# - PRODUCTION_DATABASE_URL: Production database connection string
# - SLACK_WEBHOOK_URL: Slack webhook for deployment notifications
# 
# Environment Secrets (staging/production):
# - GEMINI_API_KEY: Google Gemini API key
# - SUPABASE_URL: Supabase project URL
# - SUPABASE_ANON_KEY: Supabase anonymous key
# - SUPABASE_SERVICE_KEY: Supabase service role key
# - SECRET_KEY: Application secret key
# - SENTRY_DSN: Sentry error tracking DSN
# =============================================================================